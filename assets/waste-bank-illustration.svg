<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1200" role="img" aria-labelledby="title desc">
  <title id="title">Ilustrasi Bank Sampah</title>
  <desc id="desc">Relawan memilah botol, kertas, dan kaleng ke tempat sampah daur ulang di taman yang bersih.</desc>
  <style>
    .float { animation: float 4.8s ease-in-out infinite; transform-origin: center; }
    .float-slow { animation: float 6.2s ease-in-out -1.8s infinite; transform-origin: center; }
    .sway { animation: sway 3.6s ease-in-out infinite alternate; transform-origin: bottom center; }
    .spin { animation: spin 13s linear infinite; transform-origin: center; }
    @keyframes float { 50% { transform: translateY(-16px); } }
    @keyframes sway { to { transform: rotate(4deg); } }
    @keyframes spin { to { transform: rotate(360deg); } }
    @media (prefers-reduced-motion: reduce) { .float,.float-slow,.sway,.spin { animation: none; } }
  </style>
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#e5f8ef"/>
      <stop offset="1" stop-color="#c6efd8"/>
    </linearGradient>
    <linearGradient id="ground" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#a6dfb2"/>
      <stop offset="1" stop-color="#6bc887"/>
    </linearGradient>
    <linearGradient id="apron" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#1c9c62"/>
      <stop offset="1" stop-color="#08734a"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="14" stdDeviation="13" flood-color="#32644a" flood-opacity=".18"/></filter>
  </defs>

  <rect width="1200" height="1200" fill="url(#sky)"/>
  <circle cx="1035" cy="146" r="92" fill="#ffed9a" opacity=".9"/>
  <g fill="#fff" opacity=".65" class="float-slow">
    <path d="M782 156c21-34 70-34 90 0 24-8 47 9 47 34 0 23-18 37-41 37H755c-28 0-45-31-28-53 12-15 34-20 55-18Z"/>
    <path d="M943 314c15-24 49-24 63 0 17-6 33 7 33 24 0 16-13 26-29 26h-86c-20 0-32-22-20-38 9-11 23-15 39-12Z"/>
  </g>
  <path d="M0 857C199 763 354 835 522 870c194 41 402-30 678-204v534H0Z" fill="url(#ground)"/>
  <path d="M0 930c203-66 386-5 579 31 189 35 397-15 621-141v380H0Z" fill="#56b875" opacity=".35"/>
  <g class="sway" fill="#469e62">
    <path d="M887 735c-33-106-22-202 34-281 15 112 4 204-34 281Z"/>
    <path d="M889 716c28-90 84-147 166-171-31 83-86 140-166 171Z" fill="#66b979"/>
    <path d="M892 715c-1-93-43-160-126-202 7 91 49 158 126 202Z" fill="#77c984"/>
    <path d="M886 762h10l-1 116h-10Z" fill="#257b4b"/>
  </g>
  <g class="float" transform="translate(914 170)">
    <circle cx="0" cy="0" r="57" fill="#fff" opacity=".8"/>
    <g class="spin" fill="none" stroke="#49ad69" stroke-width="8" stroke-linecap="round" stroke-linejoin="round">
      <path d="M4-31 23-1H5"/><path d="M25 18-10 20-1 5"/><path d="M-29 10-13-20 1-5"/>
    </g>
  </g>

  <g filter="url(#shadow)">
    <ellipse cx="726" cy="966" rx="263" ry="44" fill="#347a50" opacity=".18"/>
    <!-- blue paper bin -->
    <g transform="translate(510 654)">
      <path d="M22 74h183l-15 243c-2 26-20 42-46 42H82c-25 0-42-16-45-42Z" fill="#358fce"/>
      <path d="M14 54h199c16 0 29 12 29 28v20H-15V82c0-16 13-28 29-28Z" fill="#52aee5"/>
      <path d="M71 103h79v215H71Z" fill="#2f83bf" opacity=".45"/>
      <path d="M73 198c12-20 39-20 51 0l-10 3 15 18-23 5-4-22-15 18-14-19Z" fill="#eafaff"/>
      <text x="114" y="145" text-anchor="middle" font-family="Arial, sans-serif" font-weight="700" font-size="24" fill="#f4fcff">KERTAS</text>
      <rect x="67" y="22" width="105" height="28" rx="14" fill="#287aaf"/>
    </g>
    <!-- yellow can bin -->
    <g transform="translate(753 671)">
      <path d="M21 69h166l-14 229c-2 25-18 39-43 39H76c-24 0-39-14-42-39Z" fill="#f7b93f"/>
      <path d="M12 51h184c15 0 27 12 27 27v19H-15V78c0-15 12-27 27-27Z" fill="#ffd05c"/>
      <path d="M70 104h65v196H70Z" fill="#e9a62e" opacity=".5"/>
      <path d="M73 197c12-20 39-20 51 0l-10 3 15 18-23 5-4-22-15 18-14-19Z" fill="#fff9dc"/>
      <text x="104" y="139" text-anchor="middle" font-family="Arial, sans-serif" font-weight="700" font-size="21" fill="#7e5605">KALENG</text>
      <rect x="58" y="20" width="96" height="27" rx="14" fill="#d79c2d"/>
    </g>
  </g>

  <!-- volunteer -->
  <g filter="url(#shadow)" class="float-slow">
    <path d="M439 401c42-37 111-29 143 18l55 84-45 52-78-91c-13-15-34-19-51-8l-58 40-43-58Z" fill="#f3a87f"/>
    <path d="M416 768c-3 67-13 124-30 170h-85c14-70 17-131 10-184Z" fill="#293f65"/>
    <path d="M586 764c10 64 30 122 58 174h-85c-27-60-42-118-45-176Z" fill="#293f65"/>
    <path d="M303 928h92c10 0 18 7 18 16v14H286v-14c0-9 7-16 17-16Z" fill="#f9fbff"/>
    <path d="M553 928h94c9 0 16 7 16 16v14H535v-14c0-9 8-16 18-16Z" fill="#f9fbff"/>
    <path d="M345 531c42-48 122-56 174-9 44 40 62 109 50 249H304c-8-110-4-189 41-240Z" fill="#f3a87f"/>
    <path d="M330 545c55 42 136 42 204 0l44 226H295Z" fill="url(#apron)"/>
    <path d="M412 550c0 89 8 154 24 197M500 550c-5 83-14 147-29 196" fill="none" stroke="#d0f7dc" stroke-width="8" opacity=".7"/>
    <path d="M370 621c40 23 87 23 139 0v105c-43 22-89 23-139 0Z" fill="#096d45" opacity=".55"/>
    <path d="M384 660c12-19 38-19 50 0l-10 3 15 17-23 5-4-21-15 17-14-18Z" fill="#effff4"/>
    <path d="M482 630c-19 52-17 101 5 147" fill="none" stroke="#e0fff0" stroke-width="6" opacity=".7"/>
    <circle cx="432" cy="426" r="68" fill="#f3a87f"/>
    <path d="M365 420c1-78 122-101 141-24 7 29-8 58-31 73l-5-49c-39 12-70 10-100-6l-5 27Z" fill="#263d52"/>
    <path d="M404 471c15 13 37 14 53 0-7 31-46 34-53 0Z" fill="#de7a65"/>
    <circle cx="407" cy="435" r="5" fill="#263d52"/><circle cx="460" cy="435" r="5" fill="#263d52"/>
    <path d="M427 440c-2 9-3 15 5 15" fill="none" stroke="#d57b66" stroke-width="4" stroke-linecap="round"/>
    <path d="M337 559c-23 41-31 77-24 108l91 10 15-66-42-39Z" fill="#f3a87f"/>
    <!-- held bottle -->
    <g transform="translate(292 571) rotate(-26)">
      <rect x="0" y="14" width="38" height="94" rx="16" fill="#f4fbff" stroke="#46a8cc" stroke-width="6"/>
      <rect x="9" y="0" width="20" height="21" rx="4" fill="#43a0c3"/>
      <path d="M6 56h26" stroke="#55badf" stroke-width="7"/>
    </g>
    <path d="M614 494c22 9 31 34 20 55l-42 78-53-28 37-86c7-18 21-26 38-19Z" fill="#f3a87f"/>
    <path d="m573 603 36-8 23 20-9 31-35 7-25-22Z" fill="#f3a87f"/>
  </g>
  <!-- loose recyclables -->
  <g class="float" transform="translate(684 493) rotate(18)">
    <rect x="0" y="17" width="40" height="91" rx="16" fill="#e8fbff" stroke="#37a3c7" stroke-width="6"/>
    <rect x="10" y="0" width="20" height="22" rx="4" fill="#2589ab"/>
    <path d="M6 57h28" stroke="#61c6dd" stroke-width="7"/>
  </g>
  <g class="float-slow" transform="translate(762 476) rotate(-15)">
    <path d="M0 0h56l-9 66H9Z" fill="#f6db9d"/>
    <path d="M0 16h56M7 35h43M10 53h34" stroke="#d4af5c" stroke-width="5"/>
  </g>
  <g class="sway" transform="translate(1022 776)">
    <path d="M0 104c6-55 1-95-17-121 41 34 55 74 43 121Z" fill="#56a76c"/>
    <path d="M21 104c14-51 40-82 80-95-11 45-37 77-80 95Z" fill="#74bd7d"/>
    <path d="M15 99h9v74h-9Z" fill="#2f8151"/>
  </g>
</svg>
